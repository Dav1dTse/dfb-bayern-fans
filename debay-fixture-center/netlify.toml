[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev -- --host 127.0.0.1"
  targetPort = 5173
  port = 8888
  publish = "dist"
  framework = "#custom"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
